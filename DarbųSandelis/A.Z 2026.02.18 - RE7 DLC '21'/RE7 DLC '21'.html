<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RE7 dlc '21' game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="playerCurrentStats">
    <div class="playerCurrentHealth">
      <div class="playerHealth healthLive"></div>
      <div class="playerHealth healthLive"></div>
      <div class="playerHealth healthLive"></div>
      <div class="playerHealth healthLive"></div>
      <div class="playerHealth healthLive"></div>
    </div>
    <button class="drawCardButton" accesskey="c" onclick="drawCardForPlayer()">DRAW<span>(alt+c)</span></button>
    <button class="stayButton" accesskey="s" onclick="playerStay()">STAY<span>(alt+s)</span></button>
    <!-- <input accesskey="t" type="checkbox" onclick="alert('Trump Card')" id="openTrumpCardMenu" hidden><label for="openTrumpCardMenu" class="openTrumpCardMenu">TRUMP CARDS<span>(alt+t)</span></label> -->
  </div>
  <div class="enemyCurrentStats">
    <div class="enemyCurrentHealth">
      <div class="enemyHealth healthLive"></div>
      <div class="enemyHealth healthLive"></div>
      <div class="enemyHealth healthLive"></div>
      <div class="enemyHealth healthLive"></div>
      <div class="enemyHealth healthLive"></div>
    </div>
  </div>
  <div class="opponent"></div>
  <div class="table">
    <div class="enemySide">
      <!-- <div class="enemyTrumpCardSpace">
        <div class="enemy_TrumpCard_Space_1"></div>
        <div class="enemy_TrumpCard_Space_2"></div>
        <div class="enemy_TrumpCard_Space_3"></div>
        <div class="enemy_TrumpCard_Space_4"></div>
        <div class="enemy_TrumpCard_Space_5"></div>
        <div class="enemy_TrumpCard_Space_6"></div>
      </div> -->
      <div class="enemyCardSpace">
        <div id="enemyActionText" class="enemyActionText"></div>
        <div class="enemy_PlayingCard_Place_1">
          <div class="firstCardsSpace"><div id="firstEnemyCardNumber">?</div></div>
        </div>
        <div class="enemy_PlayingCard_Place_2"></div>
        <div class="enemy_PlayingCard_Place_3"></div>
        <div class="enemy_PlayingCard_Place_4"></div>
        <div class="enemy_PlayingCard_Place_5"></div>
        <div class="enemy_PlayingCard_Place_6"></div>
      </div>
      <div class="enemyCardCounter">
        <div id="currentEnemyCsore">0</div>/<div class="currentgoal">21</div>
      </div>
    </div>
    <div class="playerSide">
      <!-- <div class="playerTrumpCardSpace">
        <div class="player_TrumpCard_Space_1"></div>
        <div class="player_TrumpCard_Space_2"></div>
        <div class="player_TrumpCard_Space_3"></div>
        <div class="player_TrumpCard_Space_4"></div>
        <div class="player_TrumpCard_Space_5"></div>
        <div class="player_TrumpCard_Space_6"></div>
      </div> -->
      <div class="playerCardSpace">
        <div class="player_PlayingCard_Place_1">
          <div class="firstCardsSpace"><div id="firstPlayerCardNumber">0</div></div>
        </div>
        <div class="player_PlayingCard_Place_2"></div>
        <div class="player_PlayingCard_Place_3"></div>
        <div class="player_PlayingCard_Place_4"></div>
        <div class="player_PlayingCard_Place_5"></div>
        <div class="player_PlayingCard_Place_6"></div>
      </div>
      <div class="playerCardCounter">
        <div id="currentPlayerScore">0</div>/<div class="currentgoal">21</div>
      </div>
    </div>
  </div>


  <script src="./script.js"></script>
</body>
</html>
