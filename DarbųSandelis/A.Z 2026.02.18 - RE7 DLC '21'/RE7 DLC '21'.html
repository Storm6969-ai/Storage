<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RE7 dlc '21' game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="opponent"></div>
  <div class="table">
    <div class="enemySide">
      <div class="enemyTrumpCardSpace">Enemy Trump card space</div>
      <div class="enemyCardSpace">
        <div class="enemy_PlayingCard_Place_1"></div>
        <div class="enemy_PlayingCard_Place_2"></div>
        <div class="enemy_PlayingCard_Place_3"></div>
        <div class="enemy_PlayingCard_Place_4"></div>
        <div class="enemy_PlayingCard_Place_5"></div>
        <div class="enemy_PlayingCard_Place_6"></div>
      </div>
      <div class="enemyCardCounter">
        ? + <div id="currentEnemyCsore">score</div>/<div id="currentgoal">goal</div>
      </div>
    </div>
    <div class="playerSide">
      <div class="playerTrumpCardSpace">Player Trump card space</div>
      <div class="playerCardSpace">
        <div class="player_PlayingCard_Place_1">
          <div class="firstCardsSpace"><div id="firstCardNumber">8</div></div>
        </div>
        <div class="player_PlayingCard_Place_2"></div>
        <div class="player_PlayingCard_Place_3"></div>
        <div class="player_PlayingCard_Place_4"></div>
        <div class="player_PlayingCard_Place_5"></div>
        <div class="player_PlayingCard_Place_6"></div>
      </div>
      <div class="playerCardCounter">
        <div id="currentPlayerCsore">score</div>/<div id="currentgoal">goal</div>
      </div>
    </div>
  </div>

  <!-- <script src="./script.js"></script> -->
</body>
</html>
